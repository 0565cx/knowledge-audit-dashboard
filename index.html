<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识点审核看板合集</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #151a22;
      --text: #e7edf6;
      --muted: #93a4bc;
      --line: rgba(148, 163, 184, 0.18);
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --good: #34d399;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at top left, rgba(167,139,250,0.12), transparent 30%), radial-gradient(circle at top right, rgba(125,211,252,0.12), transparent 30%), var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }
    body { line-height: 1.6; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 44px 24px 72px; }
    .hero {
      background: linear-gradient(180deg, rgba(21,26,34,0.98), rgba(16,21,29,0.98));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 34px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(125,211,252,0.08), transparent 38%, rgba(167,139,250,0.07));
      pointer-events: none;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
      letter-spacing: -0.03em;
      position: relative;
      z-index: 1;
    }
    .lead {
      margin: 16px 0 0;
      max-width: 820px;
      color: #d3dceb;
      font-size: 15px;
      position: relative;
      z-index: 1;
    }
    .section-title {
      margin: 30px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .section-title h2 { margin: 0; font-size: 22px; }
    .count { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      display: flex;
      flex-direction: column;
      min-height: 230px;
      padding: 22px;
      text-decoration: none;
      color: inherit;
      background: rgba(21,26,34,0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(125,211,252,0.42);
      background: rgba(24,31,42,0.96);
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(125,211,252,0.12);
      border: 1px solid rgba(125,211,252,0.16);
      color: #d8f2ff;
      font-size: 12px;
      white-space: nowrap;
    }
    .card h3 { margin: 0; font-size: 21px; }
    .card p { margin: 12px 0 0; color: var(--muted); font-size: 14px; }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: auto;
      padding-top: 22px;
    }
    .meta-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8,12,18,0.55);
      border: 1px solid var(--line);
    }
    .label { color: var(--muted); font-size: 11px; }
    .value { margin-top: 3px; font-size: 13px; font-weight: 700; }
    .footer-note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    @media (max-width: 680px) {
      .wrap { padding: 28px 16px 52px; }
      .hero { padding: 24px; border-radius: 22px; }
      .section-title { align-items: flex-start; flex-direction: column; }
      .meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Knowledge Audit Dashboard Collection</div>
      <h1>知识点审核看板合集</h1>
      <p class="lead">用于集中存放各行业、各岗位的知识点审核看板。根目录作为总入口，每个岗位看板放在独立路径，方便长期分享、版本更新和后续扩展。</p>
    </section>

    <div class="section-title">
      <h2>完整审核看板</h2>
      <div class="count">当前 1 个看板</div>
    </div>

    <section class="grid" aria-label="完整审核看板列表">
      <a class="card" href="full-dashboards/electronic-engineer/">
        <div class="tag-row">
          <span class="tag">消费电子与通信设备制造行业</span>
          <span class="tag">校招 + 社招</span>
        </div>
        <h3>电子工程师知识点审核看板</h3>
        <p>从硬件方案、调试验证、射频天线、无线通信、EMC 安规、器件选型和 NPI 量产等维度，审核电子工程师知识点清单的覆盖度、边界和可出题性。</p>
        <div class="meta">
          <div class="meta-item"><div class="label">岗位</div><div class="value">电子工程师</div></div>
          <div class="meta-item"><div class="label">经验区间</div><div class="value">0～5 年</div></div>
        </div>
      </a>
    </section>

    <div class="footer-note">后续新增看板时，在总入口继续添加卡片即可。</div>
  </main>
</body>
</html>
